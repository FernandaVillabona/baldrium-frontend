<div class="login-wrapper">

  <!-- ═══════════════════════════════════════════
       PANEL IZQUIERDO — Branding (desktop/tablet)
       ═══════════════════════════════════════════ -->
<div class="brand-panel">
  <div class="brand-content">
    <div class="logo-wrap">
      <img
        src="assets/images/logo-baldrium.png"
        alt="Baldrium Group S.A.S"
        class="logo-img"
      />
    </div>
    
  </div>
  <div class="brand-glow"></div>
</div>

  <!-- ═══════════════════════════════════════════
       PANEL DERECHO — Formulario
       ═══════════════════════════════════════════ -->
  <div class="form-panel">

    <!-- Header solo visible en móvil -->
<div class="mobile-header">
  <img
    src="assets/images/logo-baldrium.png"
    alt="Baldrium Group S.A.S"
    class="mobile-logo"
  />
</div>
    <!-- Card del formulario -->
    <div class="form-card">

      <!-- Título -->
      <div class="form-header">
        <h2>Iniciar Sesión</h2>
        <p>Bienvenido de nuevo. Ingrese sus credenciales para acceder al sistema.</p>
      </div>

      <!-- Alerta de error -->
      <div class="alert-error" *ngIf="error">
        <svg width="15" height="15" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8"  x2="12"    y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error }}
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

        <!-- ── Campo Cédula ─────────────────────────────── -->
        <div class="field-group"
             [class.field-error]="cedulaCtrl.invalid && cedulaCtrl.touched">
          <label for="cedula">CEDULA</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16"
                 viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.5">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12
                       c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2
                       V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input
              id="cedula"
              type="text"
              formControlName="cedula"
              placeholder="Cedula"
              autocomplete="username"
              inputmode="numeric"
            />
          </div>
          <span class="field-hint"
                *ngIf="cedulaCtrl.hasError('required') && cedulaCtrl.touched">
            La cédula es requerida
          </span>
        </div>

        <!-- ── Campo Contraseña ────────────────────────── -->
        <div class="field-group"
             [class.field-error]="passwordCtrl.invalid && passwordCtrl.touched">
          <label for="password">CONTRASEÑA</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16"
                 viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              id="password"
              [type]="mostrarPass ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••••••"
              autocomplete="current-password"
            />
            <button
              type="button"
              class="btn-toggle-pass"
              (click)="togglePass()"
              tabindex="-1"
              [attr.aria-label]="mostrarPass ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              <!-- Ojo abierto -->
              <svg *ngIf="!mostrarPass" width="17" height="17"
                   viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="1.5">
                <path d="M1 12s4-8 11-8 11 8 11 8
                         -4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Ojo cerrado -->
              <svg *ngIf="mostrarPass" width="17" height="17"
                   viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="1.5">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20
                         c-7 0-11-8-11-8
                         a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4
                         c7 0 11 8 11 8
                         a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="field-hint"
                *ngIf="passwordCtrl.hasError('required') && passwordCtrl.touched">
            La contraseña es requerida
          </span>
          <span class="field-hint"
                *ngIf="passwordCtrl.hasError('minlength') && passwordCtrl.touched">
            Mínimo 6 caracteres
          </span>
        </div>

        <!-- ── Botón Ingresar ──────────────────────────── -->
        <button
          type="submit"
          class="btn-login"
          [disabled]="form.invalid || cargando"
          [class.is-loading]="cargando"
        >
          <span *ngIf="!cargando">INGRESAR</span>
          <span *ngIf="cargando" class="spinner-wrap">
            <span class="spinner"></span>
            Verificando...
          </span>
        </button>

      </form>

      <!-- Link olvidé contraseña -->
      <p class="forgot-link">¿Olvidaste tu contraseña?</p>

      <!-- Footer de seguridad -->
      <div class="security-footer">
        SEGURIDAD ENCRIPTADA &bull; BALDRIUM MANAGEMENT SYSTEM
      </div>

    </div>
  </div>

</div>
